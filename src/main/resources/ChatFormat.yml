#聊天格式
#(不想做的太复杂就没有写点击聊天框的东西)

#开关
Enable: false

#设置
Set:
  #%date% 变量格式(如若无法编辑修改，请检查是否在 Config.yml 开启了全局配置)
  DateFormat: "yyyy/MM/dd-HH:mm:ss"

#格式
#注: 优先级相同时匹配到的是位居下方的格式
#    如 admin 优先级为 0, vip 优先级为 0, 而 vip 写在 admin 的后几行，则匹配到的是 vip 格式
Formats:
  #格式一
  default:
    #数值越低优先级越高
    Priority: 1
    #权限
    Permission: "cf.default"
    #格式
    Format: "&b[%date%] &f%player%&8>> &f%message%"
  #格式二
  admin:
    #数值越低优先级越高
    Priority: -1
    #权限
    Permission: "cf.admin"
    #格式
    Format:
      - "&b[%date%] &c[管理员] &f%player%&8>> &f%message%"
  vip:
    #数值越低优先级越高
    Priority: 0
    #权限
    Permission: "custom.vip"
    #格式
    Format:
      - ""
      - "&b[%date%] &c[管理员] &f%player%&8>> &f%message%"
      - ""

#禁言
Mute:
  #没有设置时间所调用的默认值(例: 如指令 /cf mute [player] 后未jie)
  #单位: 秒
  DefaultTime: 10
  #被禁言玩家尝试发送消息提示
  Message:
    - ""
    - "%prefix%&c被禁言了哦~现在还剩下 &e%time% &c秒"
    - ""

#聊天字符个数限制(每次聊天发送的字符最大数)
CharacterLimit:
  #开关
  Enable: false
  #限制字符
  Limit: 32
  #消息提示(删除内容及""则不提示消息)
  #可单行，如 -> Message: "&c嚷嚷什么呢，说这么大一串"
  Message:
    - ""
    - "&c嚷嚷什么呢，说这么一大串"
    - ""

#聊天呼叫（@某某）
Call:
  #开关
  Enable: false
  #呼叫关键词
  Key: "@"
  #被呼叫者游戏声音提示(删除内容及""则不提示游戏声音)
  Sound: "entity.generic.explode"

#屏蔽关键词
BlackTerms:
  #开关
  Enable: false
  #是否惩治所有类型玩家(包含拥有屏蔽权限及OP玩家)
  ForEveryBody: false
  #是否阻止玩家发送此条消息
  Cancel: false
  #让触发玩家做什么
  #让玩家执行指令 -> command: <指令>
  #让玩家以op身份执行指令 -> opcommand: <指令>（注: op身份是给玩家op再去除op，可能会出现卡op的情况）
  #让玩家发送消息 -> send: <内容>
  #无任何标头代指操作(如command、opcommand)则默认使用send(删除""内信息则不提示)
  Todo:
    - 'command: suicide'
    - 'send: 我是sb'
  #触发提示(删除""内信息则不提示)
  Message: "&c素质青年,从我做起"
  #关键词
  Terms:
    - 傻逼
    - 草泥马
    - 你妈死了
    - sb
    - nmsl

#词条
#如若无法编辑修改，请检查是否在 Config.yml 开启了全局配置
Message:
  #前缀
  Prefix: "&a[&bChatFormat&a]&e>> "
  #重载插件
  Reload: "%prefix%&a插件已重载！"
  #无权限提示
  NoPermission: "%prefix%&c你无法这样做！"
  #禁言错误提示
  MuteWrong: "%prefix%&c时间不可为字符串"
  #禁言成功提示
  MuteSuccess: "%prefix%&a禁言成功"

#指令提示--谁改谁憨憨，反正只是用来提示用的，出现问题我才不负责呢，哼！
Use-Help:
  - ""
  - "&a<-=-=-=-=-=-=-=-=-=-= &e&lChatFormat &a=-=-=-=-=-=-=-=-=-=->"
  - "&b/cf reload &7重载 聊天格式"
  - "&b/cf mute [player] &7操作 禁言玩家"
  - ""