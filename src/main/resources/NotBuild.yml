#禁止建筑

#开关
Enable: false

#设置
Set:
  #日期格式，作用于变量 %date%
  DateFormat: "yyyy/MM/dd-HH:mm:ss"

#阻止建筑方块
Build:
  #开关
  Enable: false
  #提示信息(删除""及其内的内容则不提示)
  Message:
    - "&b[%date%]&f-&eNotBuild"
    - "   &c你没权限这样做"
    - ""
  #启用世界
  World:
    - world
    - world_nether
    - world_the_end

#阻止建筑方块
Destruction:
  #开关
  Enable: false
  #提示信息(删除""及其内的内容则不提示)
  Message:
    - "&b[%date%]&f-&eNotBuild"
    - "   &c你没权限这样做"
    - ""
  #启用世界
  World:
    - world
    - world_nether
    - world_the_end

#词条
Message:
  #前缀
  Prefix: "&a[&bNotBuild&a]&e>> "
  #重载
  Reload: "&a已重载！"
  #无权限提示
  NoPermission: "&c你无法这样做！"

#指令提示--谁改谁憨憨，反正只是用来提示用的，出现问题我才不负责呢，哼！
Use-Help:
  - ""
  - "&a<-=-=-=-=-=-=-=-=-=-= &e&lNotBuild &a=-=-=-=-=-=-=-=-=-=->"
  - "&b/nb reload &7重载 禁止建筑"
  - ""