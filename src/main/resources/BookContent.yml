#书本文章

#权限
#sb.bc.admin 管理员权限
#sb.bc.give 获取书本权限

#开关
Enable: false

#变量设置
Set:
  #%date% 变量格式(如若无法编辑修改，请检查是否在 Config.yml 开启了全局变量配置)
  DateFormat: "yyyy/MM/dd-HH:mm:ss"

#书本
BookContent:
  #书本1(书本辨识码，用于获取书本，如 /bc give testContent)
  testContent:
    #书本名字
    Name: "一本书"
    #内容
    Content: |-
      内容1
      内容2
  #书本2(书本辨识码，用于获取书本，如 /bc give testContent2)
  testContent2:
    #书本名字
    Name: "二本书"
    #内容
    Content: |-
      内容12
      内容22

#词条
Message:
  #前缀
  Prefix: "&a[&bBookContent&a]&e>> "
  #重载
  Reload: "%prefix%&a已重载！"
  #无权限提示
  NoPermission: "%prefix%&c你无法这样做！"
  #使用玩家身份
  UsePlayer: "%prefix%&c请使用玩家身份执行！"
  #获取提示
  GiveBook: "%prefix%&a你获取了 &e%name%"
  #未找到
  NotFoundBook: "%prefix%&c没有找到书本 &e%name%"

#指令提示--谁改谁憨憨，反正只是用来提示用的，出现问题我才不负责呢，哼！
Use-Help:
  - ""
  - "&a<-=-=-=-=-=-=-=-=-=-= &e&lBookContent &a=-=-=-=-=-=-=-=-=-=->"
  - "&b/bc reload &7重载 书本文章"
  - "&b/bc give [book] &7获取书本"
  - ""