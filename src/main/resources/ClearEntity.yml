#实体清理

#开关
Enable: false

#设置(如若无法更改请查看是否在 Config.yml 文件中启用了全局配置)
Set:
  #日期格式，作用于变量 %date%
  DateFormat: "yyyy/MM/dd-HH:mm:ss"

#功能配置
ClearEntity:
  #间隔时间(秒)
  SecondTime: 120
  #清理宠物
  ClearPet: false
  #清理命名实体
  ClearNamed: false
  #达到上限才清理实体
  Total:
    #是否开启(不开启则每次都清理)
    Enable: false
    #上限数量
    Limit: 1200
  #清理实体(填写 Item、Animals、Monster, Other)
  Entity:
    - Item
    - Animals
    - Monster
  #不清理世界
  BlackWorlds:
    - bad_world
  #不清理物品(清除对象中包含才经行操作，如 ClearEntity.Entity 中不包含 Monster 则 ClearEntity.NotClearMonster 无效)
  NotClearItem:
    - Item1
  #不清理怪物(清除对象中包含才经行操作，如 ClearEntity.Entity 中不包含 Monster 则 ClearEntity.NotClearMonster 无效)
  NotClearMonster:
    - Monster1
  #不清理动物(清除对象中包含才经行操作，如 ClearEntity.Entity 中不包含 Monster 则 ClearEntity.NotClearMonster 无效)
  NotClearAnimal:
    - Animal1
  #倒计时提示时间
  CountTime:
    - 60
    - 30
    - 15
    - 5

#ClearMessgae 词条
ClearMessage:
  #倒计时提示
  CountDown: "&6谁零食掉地上了！？ヾ(•ω•`)o &e(%time%秒)"
  #清理提示
  #数值指的是清理实体个数，判断方式取决于Type
  #Type可选(=, <, >, <=, =<, >=, =>)(其他写法均不判断)
  #当两个条件都是大于，且都满足(如: 80: >, 85: >)则获取的是数值大的词条
  #如果出区间 31 < x, x < 35 则获取的是数值大的词条(Message: (35: Message))
  ClearDown:
    0:
      #判断方式(如 x = 0)
      Type: "="
      #消息内容
      Message: "%prefix%&c怎么回事！！！？怎么会一点都没有！！！？？？இ௰இ &e(%amount%个)"
    30:
      #判断方式(如 x <= 0)
      Type: "<="
      #消息内容
      Message: "%prefix%&6怎么才这么点？根本不够吃啊！太让人伤心了！ψ(._. )> &e(%amount%个)"
    31:
      #判断方式
      Type: ">"
      #消息内容
      Message: "%prefix%&6勉勉强强吧≡[。。]≡ &e(%amount%个)"
    50:
      #判断方式
      Type: "<"
      #消息内容
      Message: "%prefix%&6嗯哼，数量还行(ง •_•)ง &e(%amount%个)"
    100:
      #判断方式
      Type: ">="
      #消息内容
      Message: "%prefix%&6吼吼吼，有这么多零食！赚大发了！(๑•̀ㅂ•́)و✧ &e(%amount%个)"

#词条
Message:
  #前缀
  Prefix: "&a[&bClearEntity&a]&e>> "
  #重载插件
  Reload: "%prefix%&a已重载！"
  #无权限提示
  NoPermission: "%prefix%&c你无法这样做！"

#指令提示--谁改谁憨憨，反正只是用来提示用的，出现问题我才不负责呢，哼！
Use-Help:
  - ""
  - "&a<-=-=-=-=-=-=-=-=-=-= &e&lClearEntity &a=-=-=-=-=-=-=-=-=-=->"
  - "&b/ce reload &7重载 清理实体"
  - "&b/ce clear &7立即清理实体"
  - ""