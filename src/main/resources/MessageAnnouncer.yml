#自动公告

#开关
Enable: false

#设置
Set:
  #%date% 变量格式(如若无法编辑修改，请检查是否在 Config.yml 开启了全局配置)
  DateFormat: "yyyy/MM/dd-HH:mm:ss"

#公告
MessageAnnouncer:
  #聊天框
  Chat:
    #开关
    Enable: true
    #发送延迟时(单位: tick)
    Delay: 1200
    #公告
    Message:
      #任意，只要YAML语法允许
      first:
        - ""
        - "&b[%date%] &e测试公告1"
        - ""
      second: "&b[%date%] &e测试公告2"
      xxx:
        - ""
        - "&b[%date%] &e测试公告3"
        - ""
  #公告
  Title:
    #开关
    Enable: false
    #发送延迟时(单位: tick)
    Delay: 1200
    #公告
    Message:
      #任意，只要YAML语法允许
      first:
        #主标题
        Title: "&e第一个公告"
        #副标题
        SubTitle: "&b[%date%]"
      second:
        #主标题
        Title: "&e第二个公告"
      xxx:
        #副标题
        SubTitle: "&b[%date%]"
  #公告
  ActionBar:
    #开关
    Enable: false
    #发送延迟时(单位: tick)
    Delay: 1200
    #公告
    Message:
      #任意，只要YAML语法允许
      first: "&b[%date%] &e第一个公告"
      second: "&b[%date%] &e第二个公告"
      xxx: "&b[%date%] &e第三个公告"

#词条
Message:
  #前缀
  Prefix: "&a[&bMessageAnnouncer&a]&e>> "
  #重载
  Reload: "%prefix%&a已重载！"
  #无权限操作
  NoPermission: "%prefix%&c你没有权限这么做！"

#指令提示--谁改谁憨憨，反正只是用来提示用的，出现问题我才不负责呢，哼！
Use-Help:
  - ""
  - "&a<-=-=-=-=-=-=-=-=-=-= &e&lMessageAnnouncer &a=-=-=-=-=-=-=-=-=-=->"
  - "&b/ma reload &7重载 自动公告"
  - ""